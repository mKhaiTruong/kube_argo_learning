apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grade-submission-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mKhaiTruong/kube_argo_learning.git
    targetRevision: HEAD
    path: section-ten/kustomize/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: grade-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
